apiVersion: v1
kind: Secret
metadata:
  name: whiteboard-secrets
  namespace: whiteboard
type: Opaque
stringData:
  OIDC_CLIENT_SECRET: ""  # set this before applying
  # JWT_SECRET and CSRF_SECRET are auto-generated and persisted in the volume
  # on first start if left blank. Set explicit values for portability.
  JWT_SECRET: ""
  CSRF_SECRET: ""
